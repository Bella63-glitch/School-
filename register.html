<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>SchoolScout | Professional Portal</title> 
  <script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"> 
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
  <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        #pickerMap { height: 350px; width: 100%; border-radius: 2rem; z-index: 10; border: 2px solid #f1f5f9; }
        .amenity-tag { cursor: pointer; transition: all 0.2s; }
        .amenity-tag.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style> 
 </head> 
 <body class="text-slate-900 min-h-screen"> 
  
  <div id="authOverlay" class="fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4"> 
   <div class="bg-white w-full max-w-lg rounded-[3rem] p-12 shadow-2xl"> 
    <div class="text-center mb-10"> 
     <div class="text-3xl font-black text-blue-600 italic tracking-tighter mb-2">SchoolScout</div> 
     <h1 id="authTitle" class="text-xl font-bold text-slate-400">Sign in to your dashboard</h1> 
    </div> 
    <form id="authForm" class="space-y-4"> 
     <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all" required> 
     <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all" required> 
     <div id="regFields" class="hidden space-y-4 pt-4 border-t border-slate-50"> 
      <input type="text" id="adminName" placeholder="Administrator Name" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm outline-none"> 
      <div class="flex gap-4 justify-center py-2"> 
        <label class="flex items-center gap-2 cursor-pointer font-bold text-sm"><input type="radio" name="userRole" value="parent" checked onclick="toggleRoleFields('parent')"> Parent</label> 
        <label class="flex items-center gap-2 cursor-pointer font-bold text-sm"><input type="radio" name="userRole" value="school" onclick="toggleRoleFields('school')"> School Admin</label> 
      </div> 
      <div id="schoolInfoSection" class="hidden p-6 bg-blue-50 rounded-[2rem] space-y-4"> 
       <input type="text" id="sName" placeholder="School Name" class="w-full bg-white rounded-xl px-4 py-3 text-sm outline-none"> 
       <input type="text" id="sLoc" placeholder="City/Town" class="w-full bg-white rounded-xl px-4 py-3 text-sm outline-none"> 
      </div> 
     </div> 
     <button type="submit" id="mainBtn" class="w-all w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-blue-600 transition-all uppercase tracking-widest text-xs">Continue</button> 
    </form> 
    <button onclick="toggleMode()" id="modeBtn" class="w-full mt-8 text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-blue-600 transition">Create New Account</button> 
   </div> 
  </div> 

  <div id="dashboard" class="hidden flex min-h-screen"> 
   <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col fixed h-full z-40"> 
    <div class="p-10 text-2xl font-black text-blue-600 italic tracking-tighter">SchoolScout</div> 
    <nav class="flex-1 px-6 space-y-2"> 
     <div class="sidebar-item sidebar-item-active p-5 rounded-2xl text-sm font-black flex items-center gap-3">Management Portal</div> 
    </nav> 
    <div class="p-10 border-t border-slate-50"> 
        <button onclick="logout()" class="text-xs font-black text-red-500 uppercase tracking-widest flex items-center gap-2 hover:opacity-50 transition">Sign Out</button> 
    </div> 
   </aside> 

   <div class="flex-1 md:ml-72"> 
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-50 px-10 py-5 flex justify-between items-center sticky top-0 z-30"> 
     <div id="schoolNameLabel" class="text-sm font-black text-slate-900">Dashboard Overview</div> 
     <div id="userDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest"></div> 
    </nav> 

    <main class="p-10 max-w-5xl mx-auto space-y-10"> 
     <div id="schoolContent" class="hidden space-y-12"> 
      <header class="flex justify-between items-end"> 
       <div class="space-y-1">
        <h2 class="text-5xl font-black tracking-tighter" id="dashSchoolHeading">School Profile</h2> 
        <p class="text-slate-400 font-bold" id="dashSubLabel"></p>
       </div>
       <div class="px-5 py-2 bg-green-50 text-green-600 rounded-full text-[10px] font-black uppercase tracking-widest">Live Listing</div>
      </header> 

      <div class="grid lg:grid-cols-1 gap-10"> 
       <div class="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-sm space-y-10"> 
        <section class="grid md:grid-cols-2 gap-8"> 
         <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Educational Level</label>
            <select id="dashLevel" class="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border border-transparent focus:border-blue-100"> 
                <option value="Pre-School">Pre-School</option>
                <option value="Primary">Primary</option>
                <option value="Junior Secondary">Junior Secondary</option>
                <option value="High School">High School</option>
                <option value="University">University</option>
                <option value="College">College</option>
                <option value="Special Needs">Special Needs Center</option> 
            </select> 
         </div>
         <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Study Type</label>
            <select id="dashType" class="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border border-transparent focus:border-blue-100"> 
                <option value="Day">Day</option>
                <option value="Boarding">Boarding</option>
                <option value="Day & Boarding">Day & Boarding</option>
                <option value="Special Needs Dedicated">Special Needs Dedicated</option> 
            </select> 
         </div>
         <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Annual Fees (KES)</label>
            <input type="number" id="dashFee" placeholder="e.g. 50000" class="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border border-transparent focus:border-blue-100">
         </div>
         <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Official Phone</label>
            <input type="text" id="dashPhone" placeholder="0712..." class="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border border-transparent focus:border-blue-100">
         </div>
        </section>

        <section class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Institutional Description</label>
            <textarea id="dashDescription" rows="5" placeholder="Highlight your school's history, mission, and achievements..." class="w-full bg-slate-50 rounded-[2rem] px-8 py-6 text-sm font-medium outline-none border border-transparent focus:border-blue-100 leading-relaxed"></textarea>
        </section>

        <section class="space-y-4">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Select Amenities Available</label>
            <div id="amenityCloud" class="flex flex-wrap gap-2">
                </div>
            <input type="hidden" id="dashAmenities">
        </section>

        <section class="space-y-4 pt-6">
            <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-2">Location: Pin your School</label>
            <div id="pickerMap"></div>
            <p class="text-[10px] font-bold text-slate-400 italic">Drag the pin or click on the map to update your exact coordinates.</p>
            <input type="hidden" id="dashLat"><input type="hidden" id="dashLng">
        </section>

        <section class="space-y-6 pt-10 border-t border-slate-50">
            <div class="flex justify-between items-center">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Institutional Gallery</label>
                <button onclick="document.getElementById('fileInput').click()" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:underline">Add Photos</button>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="uploadGallery()"> 
            <div id="galleryPreview" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <button onclick="updateFullProfile()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black shadow-2xl hover:bg-slate-900 transition-all uppercase tracking-widest text-xs">Update Profile & Live Sync</button> 
       </div> 
      </div> 
     </div> 
    </main> 
   </div> 
  </div> 

  <script>
    const APP_ID = "7C583CBA-2EDA-488B-8593-0ED33DD5C3D3";
    const API_KEY = "2E3D73DF-6DE9-4F76-9DB1-D240978DEE1D";
    Backendless.initApp(APP_ID, API_KEY);

    let isLogin = true;
    let currentUser = null;
    let map, marker;
    const amenityOptions = ["Swimming Pool", "Transport", "STEM Lab", "CBC Resources", "Music Studio", "Football Pitch", "Library", "Computer Lab", "Boarding Facilities", "WiFi", "Dining Hall", "Art Room", "Basketball Court", "Science Lab", "Farm Area"];
    let selectedAmenities = [];

    // Initialize Amenities UI
    function initAmenities(existing = "") {
        const cloud = document.getElementById('amenityCloud');
        cloud.innerHTML = "";
        selectedAmenities = existing ? existing.split(',').map(s => s.trim()) : [];
        
        amenityOptions.forEach(opt => {
            const span = document.createElement('span');
            span.className = `amenity-tag px-4 py-2 rounded-full text-[11px] font-bold border ${selectedAmenities.includes(opt) ? 'active' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-200'}`;
            span.innerText = opt;
            span.onclick = () => {
                if(selectedAmenities.includes(opt)) {
                    selectedAmenities = selectedAmenities.filter(a => a !== opt);
                    span.className = "amenity-tag px-4 py-2 rounded-full text-[11px] font-bold border bg-white text-slate-400 border-slate-100 hover:border-blue-200";
                } else {
                    selectedAmenities.push(opt);
                    span.className = "amenity-tag px-4 py-2 rounded-full text-[11px] font-bold border active";
                }
                document.getElementById('dashAmenities').value = selectedAmenities.join(',');
            };
            cloud.appendChild(span);
        });
        document.getElementById('dashAmenities').value = selectedAmenities.join(',');
    }

    function initPickerMap(lat = -1.286389, lng = 36.817223) {
        if (map) return;
        map = L.map('pickerMap', { scrollWheelZoom: false }).setView([lat, lng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        
        map.on('click', (e) => {
            marker.setLatLng(e.latlng);
            setCoords(e.latlng.lat, e.latlng.lng);
        });
        marker.on('dragend', () => {
            const pos = marker.getLatLng();
            setCoords(pos.lat, pos.lng);
        });
    }

    function setCoords(lat, lng) {
        document.getElementById('dashLat').value = lat;
        document.getElementById('dashLng').value = lng;
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? 'Sign in to your dashboard' : 'Create an Institutional Account';
        document.getElementById('regFields').classList.toggle('hidden');
        document.getElementById('mainBtn').innerText = isLogin ? 'Continue' : 'Register Institution';
        document.getElementById('modeBtn').innerText = isLogin ? 'Create New Account' : 'Back to Login';
    }

    function toggleRoleFields(role) {
        document.getElementById('schoolInfoSection').classList.toggle('hidden', role !== 'school');
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            if (isLogin) {
                currentUser = await Backendless.UserService.login(document.getElementById('email').value, document.getElementById('pass').value, true);
                initDashboard();
            } else {
                const user = new Backendless.User();
                user.email = document.getElementById('email').value; 
                user.password = document.getElementById('pass').value;
                user.userRole = document.querySelector('input[name="userRole"]:checked').value;
                if (user.userRole === 'school') {
                    const school = await Backendless.Data.of("Schools").save({
                        name: document.getElementById('sName').value,
                        location: document.getElementById('sLoc').value,
                        isverified: true
                    });
                    user.managedSchoolId = school.objectId;
                }
                await Backendless.UserService.register(user);
                alert("Account created! Please Sign In."); toggleMode();
            }
        } catch (err) { alert(err.message); }
    });

    async function initDashboard() {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('userDisplay').innerText = currentUser.email;

        if (currentUser.userRole === 'school' && currentUser.managedSchoolId) {
            document.getElementById('schoolContent').classList.remove('hidden');
            const school = await Backendless.Data.of("Schools").findById(currentUser.managedSchoolId);
            
            document.getElementById('dashSchoolHeading').innerText = school.name;
            document.getElementById('dashSubLabel').innerText = `${school.location} • Educational Management`;
            document.getElementById('dashFee').value = school.annualfee || "";
            document.getElementById('dashDescription').value = school.description || "";
            document.getElementById('dashPhone').value = school.phone || "";
            document.getElementById('dashLevel').value = school.level || "Primary";
            document.getElementById('dashType').value = school.type || "Day";

            initAmenities(school.amenities || "");
            const lat = school.latitude || -1.286389;
            const lng = school.longitude || 36.817223;
            setCoords(lat, lng);
            initPickerMap(lat, lng);
            renderGallery(school.gallery);
        }
    }

    async function updateFullProfile() {
        try {
            await Backendless.Data.of("Schools").save({
                objectId: currentUser.managedSchoolId,
                annualfee: parseInt(document.getElementById('dashFee').value),
                description: document.getElementById('dashDescription').value,
                phone: document.getElementById('dashPhone').value,
                level: document.getElementById('dashLevel').value,
                type: document.getElementById('dashType').value,
                amenities: document.getElementById('dashAmenities').value,
                latitude: parseFloat(document.getElementById('dashLat').value),
                longitude: parseFloat(document.getElementById('dashLng').value)
            });
            alert("Profile successfully synchronized with SchoolScout!");
        } catch (e) { alert(e.message); }
    }

    async function uploadGallery() {
        const files = document.getElementById('fileInput').files;
        if (!files.length) return;
        try {
            let names = [];
            for (let f of files) {
                const res = await Backendless.Files.upload(f, "school_images", true);
                names.push(res.fileURL.split('/').pop());
            }
            const school = await Backendless.Data.of("Schools").findById(currentUser.managedSchoolId);
            const currentG = Array.isArray(school.gallery) ? school.gallery : [];
            await Backendless.Data.of("Schools").save({ objectId: currentUser.managedSchoolId, gallery: [...currentG, ...names] });
            renderGallery([...currentG, ...names]);
            alert("Gallery updated!");
        } catch (e) { alert(e.message); }
    }

    function renderGallery(gallery) {
        if (!gallery) return;
        const arr = Array.isArray(gallery) ? gallery : JSON.parse(gallery);
        document.getElementById('galleryPreview').innerHTML = arr.map(img => `
            <div class="aspect-square bg-slate-50 rounded-[1.5rem] overflow-hidden border border-slate-100">
                <img src="https://backendlessappcontent.com/${APP_ID}/${API_KEY}/files/school_images/${img}" class="w-full h-full object-cover">
            </div>
        `).join('');
    }

    function logout() { Backendless.UserService.logout().finally(() => location.reload()); }
  </script> 
 </body>
</html>
