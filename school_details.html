<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>School Details | SchoolScout</title> 
  <script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"> 
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
  <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; }
        #schoolMap { height: 400px; width: 100%; border-radius: 2.5rem; z-index: 1; border: 1px solid #e2e8f0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; border-radius: 2rem; }
    </style> 
 </head> 
 <body class="text-slate-900"> 
  <nav class="bg-white/90 backdrop-blur-md border-b border-slate-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50"> 
   <div class="text-2xl font-black text-blue-600 italic tracking-tighter cursor-pointer" onclick="window.history.back()">SchoolScout</div> 
   <div class="flex gap-3"> 
    <a id="navCall" href="#" class="bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest flex items-center gap-2">Call</a> 
    <a id="navWhatsapp" href="#" target="_blank" class="btn-whatsapp px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest flex items-center gap-2">WhatsApp</a> 
   </div> 
  </nav> 

  <main id="loadingState" class="max-w-6xl mx-auto p-12 text-center font-bold text-slate-400">Loading School Data...</main>

  <main id="mainContent" class="max-w-6xl mx-auto p-6 md:p-12 space-y-12 hidden"> 
   <section class="grid lg:grid-cols-2 gap-12 items-start"> 
    <div class="space-y-6"> 
     <div id="catBadge" class="inline-block px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest bg-blue-50 text-blue-600"></div> 
     <h1 id="schoolName" class="text-5xl font-extrabold tracking-tight text-slate-900 leading-tight"></h1> 
     <p id="schoolLocation" class="text-xl text-slate-400 font-bold flex items-center gap-2"> 
      <span id="locText"></span>
     </p> 
     <div class="grid grid-cols-2 gap-4 py-6 border-y border-slate-100"> 
      <div> 
       <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Average Rating</p> 
       <div class="flex items-center gap-2"><span id="avgRating" class="text-3xl font-black text-slate-900"></span><span class="text-amber-400 text-xl">★★★★★</span></div> 
      </div> 
      <div> 
       <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Annual Tuition</p> 
       <p id="feeLabel" class="text-3xl font-black text-blue-600"></p> 
      </div> 
     </div> 
     <div class="grid grid-cols-2 gap-4 pt-4"> 
        <a id="mainCall" href="#" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-100 rounded-[2rem] hover:bg-slate-50 transition">
            <span class="text-sm font-black uppercase">Call Office</span>
        </a>
        <a id="mainWhatsapp" href="#" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-100 rounded-[2rem] hover:bg-slate-50 transition">
            <span class="text-sm font-black uppercase">Chat Now</span>
        </a>
     </div> 
    </div> 
    <div id="mainGallery" class="grid grid-cols-2 gap-4 h-[500px]"></div> 
   </section> 

   <section class="grid lg:grid-cols-3 gap-12"> 
    <div class="lg:col-span-2 space-y-12"> 
     <div class="bg-white p-12 rounded-[3.5rem] shadow-sm border border-slate-100"> 
      <h3 class="text-2xl font-black mb-8">Institutional Overview</h3> 
      <div class="grid grid-cols-2 md:grid-cols-3 gap-8 pb-10 border-b border-slate-50"> 
       <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Level</p><p id="level" class="font-bold text-lg"></p></div> 
       <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Religion</p><p id="religion" class="font-bold text-lg"></p></div> 
       <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Curriculum</p><p id="curriculum" class="font-bold text-lg"></p></div> 
      </div> 
      <div class="pt-10"> 
       <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Amenities</p> 
       <div id="amenityList" class="flex flex-wrap gap-2"></div> 
      </div> 
     </div> 
     <div id="schoolMap"></div> 
    </div> 
    <div class="bg-white p-8 rounded-[3rem] border border-slate-100"> 
      <h4 class="font-black text-xl mb-6">Parent Ratings</h4> 
      <div id="reviewList" class="space-y-6 max-h-[600px] overflow-y-auto custom-scroll pr-2"></div> 
    </div> 
   </section> 
  </main>

  <script>
    // 1. INITIALIZE BACKENDLESS (ENTER YOUR REAL KEYS HERE)
    Backendless.initApp('YOUR_APP_ID', 'YOUR_JS_API_KEY');

    async function fetchSchoolDetails() {
        // Get 'id' from URL parameters (?id=XXXX-XXXX-XXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const schoolId = urlParams.get('id');

        if (!schoolId) {
            document.getElementById('loadingState').innerText = "No school ID found in URL.";
            return;
        }

        try {
            const school = await Backendless.Data.of("Schools").findById(schoolId);
            renderPage(school);
        } catch (error) {
            console.error("Error fetching school:", error);
            document.getElementById('loadingState').innerText = "School not found.";
        }
    }

    function renderPage(data) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');

        // Text Content
        document.getElementById('catBadge').innerText = data.category || 'School';
        document.getElementById('schoolName').innerText = data.name;
        document.getElementById('locText').innerText = data.location;
        document.getElementById('avgRating').innerText = data.avgRating || '0.0';
        document.getElementById('feeLabel').innerText = `KES ${(data.fee || 0).toLocaleString()}`;
        document.getElementById('level').innerText = data.level || 'N/A';
        document.getElementById('religion').innerText = data.religion || 'N/A';
        document.getElementById('curriculum').innerText = data.curriculum || 'N/A';

        // Contact Links
        const phone = data.phone || '';
        const wa = data.whatsapp || '';
        document.getElementById('navCall').href = `tel:${phone}`;
        document.getElementById('mainCall').href = `tel:${phone}`;
        document.getElementById('navWhatsapp').href = `https://wa.me/${wa}`;
        document.getElementById('mainWhatsapp').href = `https://wa.me/${wa}`;

        // Amenities (Handles array or comma-string)
        const amenities = Array.isArray(data.amenities) ? data.amenities : (data.amenities?.split(',') || []);
        const aList = document.getElementById('amenityList');
        amenities.forEach(a => {
            const span = document.createElement('span');
            span.className = "px-4 py-2 bg-slate-50 text-slate-600 rounded-full text-[11px] font-bold border border-slate-100 uppercase";
            span.innerText = a.trim();
            aList.appendChild(span);
        });

        // Gallery
        const images = data.images || [];
        const gallery = document.getElementById('mainGallery');
        images.slice(0, 2).forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'gallery-img shadow-lg';
            gallery.appendChild(img);
        });

        // Map
        if (data.lat && data.lng) {
            const map = L.map('schoolMap', { scrollWheelZoom: false }).setView([data.lat, data.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([data.lat, data.lng]).addTo(map).bindPopup(data.name).openPopup();
        }
    }

    window.onload = fetchSchoolDetails;
  </script>
 </body>
</html>
